<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#3f463f" />
    <title>Construtor de Rede Empresarial 3D</title>
    <style>
      html,body{margin:0;min-height:100%;font-family:Arial,sans-serif;background:#263128;color:#fff}
      #carregando{min-height:100vh;display:grid;place-items:center;text-align:center;padding:24px;box-sizing:border-box}
      #carregando>div{max-width:640px;padding:28px;border-radius:18px;background:#354238;border:1px solid #d9ce9c}
      #erro-inicial{display:none;white-space:pre-wrap;text-align:left;background:#542f2f;border-radius:10px;padding:14px;margin-top:14px;font-size:13px}
    </style>
    <script>
      function mostrarErroInicial(erro) {
        var box = document.getElementById('erro-inicial');
        var titulo = document.getElementById('titulo-inicial');
        if (titulo) titulo.textContent = 'O site carregou, mas ocorreu um erro';
        if (box) {
          box.style.display = 'block';
          box.textContent = String((erro && (erro.stack || erro.message)) || erro || 'Erro desconhecido');
        }
      }
      window.addEventListener('error', function (event) { mostrarErroInicial(event.error || event.message); });
      window.addEventListener('unhandledrejection', function (event) { mostrarErroInicial(event.reason); });
    </script>
  </head>
  <body>
    <div id="app">
      <main id="carregando">
        <div>
          <h1 id="titulo-inicial">Carregando Rede Empresarial 3D...</h1>
          <p>Se esta mensagem permanecer, o quadro abaixo mostrará o erro para facilitar a correção.</p>
          <div id="erro-inicial"></div>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
